name: Desktop Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows-x64:
    name: Build Windows x64 Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run package:desktop -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-x64
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*

  windows-arm64:
    name: Build Windows arm64 Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run package:desktop -- --target aarch64-pc-windows-msvc --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows-arm64
          path: apps/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*

  ubuntu-x64:
    name: Build Ubuntu x64 Package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run package:desktop -- --target x86_64-unknown-linux-gnu --bundles deb,appimage

      - name: Upload Ubuntu artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-ubuntu-x64
          path: |
            apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  ubuntu-arm64:
    name: Build Ubuntu arm64 Package
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run package:desktop -- --target aarch64-unknown-linux-gnu --bundles deb,appimage

      - name: Upload Ubuntu artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-ubuntu-arm64
          path: |
            apps/desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  macos-arm64:
    name: Build macOS arm64 Package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run package:desktop -- --target aarch64-apple-darwin --bundles dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos-arm64
          path: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
